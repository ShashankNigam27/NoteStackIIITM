<!DOCTYPE html>
<html lang="en" class="light">
<head>
 <meta charset="utf-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title>{% block title %}NoteStack | Your Smart Exam-Prep Study Buddy{% endblock %}</title>

 <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Inter:wght@100..900&display=swap" rel="stylesheet" />
 <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

 <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
 <script src="{{ url_for('static', filename='js/tailwind-config.js') }}"></script>
 <link href="{{ url_for('static', filename='css/global.css') }}" rel="stylesheet" />
  <script src="{{ url_for('static', filename='js/utils.js') }}" defer></script>
  
  <!-- Firebase App & Auth SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="{{ url_for('static', filename='js/firebase.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/api.js') }}" defer></script>

 <style>
 {% block extra_styles %}{% endblock %}
 </style>
</head>
<body class="{% block body_class %}bg-surface text-on-surface font-body{% endblock %}">

    <!-- Pop-up (System Notifications) Block -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="fixed top-8 right-8 z-[100] flex flex-col gap-4 pointer-events-none">
          {% for message in messages %}
            <div class="brutalist-toast pointer-events-auto cursor-pointer">
                {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

 {% block scripts %}
 <script>
 // General scripts can go here
 </script>
 {% endblock %}
</body>
</html>
